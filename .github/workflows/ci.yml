name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  english:
    name: English — Test & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: English
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: English/package-lock.json
      - run: npm ci
      - run: npm test
      - run: npm run build

  math:
    name: Math — Test & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: math
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: math/package-lock.json
      - run: npm ci
      - run: npm test
      - run: npm run build
