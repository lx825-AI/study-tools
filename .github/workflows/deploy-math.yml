name: Deploy Math to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'math/**'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: math/package-lock.json
      - run: npm ci
        working-directory: math
      - run: npm test
        working-directory: math
      - run: npm run build
        working-directory: math
      - uses: actions/configure-pages@v4
      - uses: actions/upload-pages-artifact@v3
        with:
          path: math/dist
      - id: deployment
        uses: actions/deploy-pages@v4
