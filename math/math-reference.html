<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI 数学公式速查表</title>
<meta name="description" content="高等数学、线性代数、离散数学公式速查表，涵盖大一期末考试必备公式">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css">
<script src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js" defer></script>
<style>
/* ===== CSS 自定义属性（主题变量） ===== */
:root {
  --bg: #f8fafc;
  --text: #1e293b;
  --text-heading: #1e293b;
  --text-secondary: #64748b;
  --text-muted: #475569;
  --text-detail: #334155;
  --surface: #fff;
  --surface-hover: #f1f5f9;
  --border: #e2e8f0;
  --border-light: #f1f5f9;
  --primary: #4f46e5;
  --primary-light: #eef2ff;
  --primary-border: #c7d2fe;
  --primary-dark: #3730a3;
  --primary-text-light: #c7d2fe;
  --hint: #6366f1;
  --hint-hover: #4f46e5;
  --latex-bg: #f8fafc;
  --toast-bg: #1e293b;
  --toast-text: #fff;
  --shadow-sm: 0 1px 3px rgba(0,0,0,0.05);
  --shadow-md: 0 4px 16px rgba(0,0,0,0.08);
  --shadow-lg: 0 4px 20px rgba(79,70,229,0.12);
  --shadow-toggle: 0 2px 8px rgba(0,0,0,0.08);
  --shadow-toggle-hover: 0 4px 16px rgba(0,0,0,0.12);
  --copy-bg: #fff;
  --copy-hover-bg: #f1f5f9;
  --copy-copied-bg: #dcfce7;
  --copy-copied-border: #86efac;
  --fav-hover-bg: #fef3c7;
  --fav-hover-border: #fbbf24;
  --fav-active-border: #f59e0b;
  --badge-basic-bg: #f1f5f9;
  --badge-basic-text: #64748b;
  --badge-important-bg: #fff7ed;
  --badge-important-text: #ea580c;
  --badge-advanced-bg: #eff6ff;
  --badge-advanced-text: #2563eb;
  --tool-btn-bg: #fff;
  --tool-btn-text: #64748b;
  --tool-btn-active-bg: #eef2ff;
  --tool-btn-active-border: #c7d2fe;
  --sort-btn-text: #475569;
}

/* 暗色主题 */
:root.dark {
  --bg: #0f172a;
  --text: #e2e8f0;
  --text-heading: #f1f5f9;
  --text-secondary: #94a3b8;
  --text-muted: #cbd5e1;
  --text-detail: #cbd5e1;
  --surface: #1e293b;
  --surface-hover: #334155;
  --border: #334155;
  --border-light: #334155;
  --primary: #818cf8;
  --primary-light: #3730a3;
  --primary-border: #6366f1;
  --primary-dark: #3730a3;
  --primary-text-light: #c7d2fe;
  --hint: #818cf8;
  --hint-hover: #a5b4fc;
  --latex-bg: #0f172a;
  --toast-bg: #e2e8f0;
  --toast-text: #1e293b;
  --shadow-sm: 0 1px 3px rgba(0,0,0,0.3);
  --shadow-md: 0 4px 16px rgba(0,0,0,0.4);
  --shadow-lg: 0 4px 20px rgba(129,140,248,0.2);
  --shadow-toggle: 0 2px 8px rgba(0,0,0,0.3);
  --shadow-toggle-hover: 0 4px 16px rgba(0,0,0,0.4);
  --copy-bg: #1e293b;
  --copy-hover-bg: #334155;
  --copy-copied-bg: #14532d;
  --copy-copied-border: #22c55e;
  --fav-hover-bg: #422006;
  --fav-hover-border: #f59e0b;
  --fav-active-border: #f59e0b;
  --badge-basic-bg: #334155;
  --badge-basic-text: #94a3b8;
  --badge-important-bg: #431407;
  --badge-important-text: #fdba74;
  --badge-advanced-bg: #172554;
  --badge-advanced-text: #93c5fd;
  --tool-btn-bg: #1e293b;
  --tool-btn-text: #94a3b8;
  --tool-btn-active-bg: #3730a3;
  --tool-btn-active-border: #6366f1;
  --sort-btn-text: #cbd5e1;
}

/* 自动模式：跟随系统 */
@media (prefers-color-scheme: dark) {
  :root:not(.light) {
    --bg: #0f172a;
    --text: #e2e8f0;
    --text-heading: #f1f5f9;
    --text-secondary: #94a3b8;
    --text-muted: #cbd5e1;
    --text-detail: #cbd5e1;
    --surface: #1e293b;
    --surface-hover: #334155;
    --border: #334155;
    --border-light: #334155;
    --primary: #818cf8;
    --primary-light: #3730a3;
    --primary-border: #6366f1;
    --primary-dark: #3730a3;
    --primary-text-light: #c7d2fe;
    --hint: #818cf8;
    --hint-hover: #a5b4fc;
    --latex-bg: #0f172a;
    --toast-bg: #e2e8f0;
    --toast-text: #1e293b;
    --shadow-sm: 0 1px 3px rgba(0,0,0,0.3);
    --shadow-md: 0 4px 16px rgba(0,0,0,0.4);
    --shadow-lg: 0 4px 20px rgba(129,140,248,0.2);
    --shadow-toggle: 0 2px 8px rgba(0,0,0,0.3);
    --shadow-toggle-hover: 0 4px 16px rgba(0,0,0,0.4);
    --copy-bg: #1e293b;
    --copy-hover-bg: #334155;
    --copy-copied-bg: #14532d;
    --copy-copied-border: #22c55e;
    --fav-hover-bg: #422006;
    --fav-hover-border: #f59e0b;
    --fav-active-border: #f59e0b;
    --badge-basic-bg: #334155;
    --badge-basic-text: #94a3b8;
    --badge-important-bg: #431407;
    --badge-important-text: #fdba74;
    --badge-advanced-bg: #172554;
    --badge-advanced-text: #93c5fd;
    --tool-btn-bg: #1e293b;
    --tool-btn-text: #94a3b8;
    --tool-btn-active-bg: #3730a3;
    --tool-btn-active-border: #6366f1;
    --sort-btn-text: #cbd5e1;
  }
}

/* ===== 基础重置 ===== */
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
  background: var(--bg);
  color: var(--text);
  display: flex;
  min-height: 100vh;
}

/* ===== 侧边栏 ===== */
.sidebar {
  width: 260px;
  flex-shrink: 0;
  background: var(--surface);
  border-right: 1px solid var(--border);
  padding: 24px 16px;
  position: sticky;
  top: 0;
  height: 100vh;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
  gap: 4px;
}

.sidebar-title {
  font-size: 18px;
  font-weight: 700;
  color: var(--primary);
  padding: 0 12px 16px;
  letter-spacing: -0.3px;
}

.sidebar .category {
  font-size: 12px;
  font-weight: 600;
  color: var(--text-secondary);
  text-transform: uppercase;
  letter-spacing: 0.5px;
  padding: 16px 12px 6px;
}
.sidebar .category:first-of-type { padding-top: 0; }

.sidebar .sub {
  display: block;
  width: 100%;
  text-align: left;
  padding: 8px 12px;
  border: none;
  border-radius: 8px;
  font-size: 14px;
  color: var(--text-muted);
  background: transparent;
  cursor: pointer;
  transition: all 0.15s;
}
.sidebar .sub:hover { background: var(--surface-hover); color: var(--text); }
.sidebar .sub.active { background: var(--primary-light); color: var(--primary); font-weight: 600; }

/* ===== 主内容区 ===== */
.main {
  flex: 1;
  padding: 32px 40px;
  max-width: 960px;
}

.main-header {
  margin-bottom: 32px;
}
.main-header h1 {
  font-size: 28px;
  font-weight: 700;
  color: var(--text-heading);
  letter-spacing: -0.5px;
}

/* 搜索框 */
.search-wrap {
  position: relative;
  margin-bottom: 28px;
}
.search-wrap input {
  width: 100%;
  padding: 12px 16px 12px 44px;
  border: 2px solid var(--border);
  border-radius: 12px;
  font-size: 15px;
  outline: none;
  background: var(--surface);
  color: var(--text);
  transition: border-color 0.2s;
}
.search-wrap input:focus { border-color: var(--primary); }
.search-wrap .search-icon {
  position: absolute;
  left: 14px;
  top: 50%;
  transform: translateY(-50%);
  font-size: 18px;
  color: var(--text-secondary);
}

/* 分类标题 */
.section-title {
  font-size: 20px;
  font-weight: 700;
  margin: 32px 0 16px;
  color: var(--text-heading);
}
.section-title:first-child { margin-top: 0; }

/* 公式卡片 */
.formula-grid { display: grid; gap: 12px; margin-bottom: 8px; }

.formula-card {
  background: var(--surface);
  border-radius: 12px;
  padding: 20px 24px;
  box-shadow: var(--shadow-sm);
  border: 1px solid var(--border-light);
  transition: box-shadow 0.2s, border-color 0.2s;
  cursor: pointer;
  position: relative;
}
.formula-card:hover {
  box-shadow: var(--shadow-md);
  border-color: var(--primary-border);
}
.formula-card.expanded {
  border-color: var(--primary);
  box-shadow: var(--shadow-lg);
}
.formula-name {
  font-size: 15px;
  font-weight: 600;
  color: var(--text-heading);
  margin-bottom: 12px;
}
.formula-latex {
  padding: 18px 24px;
  background: var(--latex-bg);
  border-radius: 8px;
  overflow-x: auto;
  font-size: 17px;
  margin-bottom: 10px;
  line-height: 1.7;
}

.formula-latex .katex-display > .katex {
  line-height: 1.8;
}

.formula-note {
  font-size: 13px;
  color: var(--text-secondary);
  line-height: 1.5;
}

.formula-expand-hint {
  font-size: 12px;
  color: var(--hint);
  margin-top: 8px;
  user-select: none;
  transition: color 0.2s;
}
.formula-card:hover .formula-expand-hint { color: var(--hint-hover); }
.formula-card.expanded .formula-expand-hint { color: var(--hint-hover); }

.formula-detail {
  max-height: 0;
  overflow: hidden;
  transition: max-height 0.4s ease, margin-top 0.3s, padding-top 0.3s;
  border-top: 0 solid var(--border);
  margin-top: 0;
  padding-top: 0;
  font-size: 14px;
  line-height: 1.7;
  color: var(--text-detail);
}
.formula-card.expanded .formula-detail {
  max-height: 600px;
  border-top-width: 1px;
  margin-top: 12px;
  padding-top: 12px;
}

.formula-card.hidden { display: none; }

.no-result {
  text-align: center;
  padding: 64px 20px;
  color: var(--text-secondary);
  font-size: 15px;
}

/* 搜索高亮 */
mark {
  background: #fef08a;
  color: inherit;
  border-radius: 2px;
  padding: 0 1px;
}

/* ===== 响应式 ===== */
@media (max-width: 768px) {
  body { flex-direction: column; }
  .sidebar {
    width: 100%;
    height: auto;
    position: static;
    flex-direction: row;
    flex-wrap: wrap;
    padding: 12px 16px;
    gap: 6px;
    border-right: none;
    border-bottom: 1px solid var(--border);
  }
  .sidebar.mobile-collapsed { display: none; }
  .sidebar-title { width: 100%; padding: 4px 0 8px; font-size: 16px; }
  .sidebar .category { display: none; }
  .sidebar .sub { font-size: 13px; padding: 8px 14px; flex-shrink: 0; white-space: nowrap; }
  .main { padding: 20px 16px; }
}

/* ===== 复制按钮 ===== */
.copy-btn {
  position: absolute;
  top: 12px;
  right: 12px;
  width: 32px;
  height: 32px;
  border: 1px solid var(--border);
  border-radius: 8px;
  background: var(--copy-bg);
  cursor: pointer;
  font-size: 14px;
  display: flex;
  align-items: center;
  justify-content: center;
  opacity: 0;
  transition: opacity 0.2s, background 0.15s, border-color 0.15s;
  z-index: 1;
}
.formula-card:hover .copy-btn { opacity: 1; }
.copy-btn:hover { background: var(--copy-hover-bg); border-color: var(--primary-border); }
.copy-btn.copied { background: var(--copy-copied-bg); border-color: var(--copy-copied-border); }

/* 收藏按钮 */
.favorite-btn {
  position: absolute;
  top: 12px;
  right: 50px;
  width: 32px;
  height: 32px;
  border: 1px solid var(--border);
  border-radius: 8px;
  background: var(--copy-bg);
  cursor: pointer;
  font-size: 15px;
  display: flex;
  align-items: center;
  justify-content: center;
  opacity: 0;
  transition: opacity 0.2s, background 0.15s, border-color 0.15s;
  z-index: 1;
}
.formula-card:hover .favorite-btn { opacity: 1; }
.favorite-btn:hover { background: var(--fav-hover-bg); border-color: var(--fav-hover-border); }
.favorite-btn.favorited { opacity: 1; background: var(--fav-hover-bg); border-color: var(--fav-active-border); }

/* 难度标签 */
.level-badge {
  display: inline-block;
  font-size: 11px;
  font-weight: 600;
  padding: 2px 8px;
  border-radius: 4px;
  margin-left: 8px;
  vertical-align: middle;
  letter-spacing: 0.3px;
}
.level-badge.basic { background: var(--badge-basic-bg); color: var(--badge-basic-text); }
.level-badge.important { background: var(--badge-important-bg); color: var(--badge-important-text); }
.level-badge.advanced { background: var(--badge-advanced-bg); color: var(--badge-advanced-text); }

/* Toast */
.toast {
  position: fixed;
  bottom: 32px;
  left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: var(--toast-bg);
  color: var(--toast-text);
  padding: 10px 20px;
  border-radius: 10px;
  font-size: 14px;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.25s, transform 0.25s;
  z-index: 999;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* 主题切换按钮（右上角） */
.theme-toggle {
  position: fixed;
  top: 16px;
  right: 20px;
  width: 40px;
  height: 40px;
  border: 1px solid var(--border);
  border-radius: 50%;
  background: var(--surface);
  color: var(--text);
  cursor: pointer;
  font-size: 20px;
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow: var(--shadow-toggle);
  transition: all 0.2s;
  z-index: 100;
}
.theme-toggle:hover {
  box-shadow: var(--shadow-toggle-hover);
  border-color: var(--primary-border);
  transform: scale(1.08);
}
.theme-toggle:active { transform: scale(0.95); }

/* 回到顶部按钮 */
.back-to-top {
  position: fixed;
  bottom: 32px;
  right: 28px;
  width: 42px;
  height: 42px;
  border: 1px solid var(--border);
  border-radius: 50%;
  background: var(--surface);
  color: var(--text);
  cursor: pointer;
  font-size: 18px;
  display: flex;
  align-items: center;
  justify-content: center;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.25s, transform 0.2s;
  z-index: 100;
  box-shadow: var(--shadow-toggle);
}
.back-to-top.visible { opacity: 1; pointer-events: auto; }
.back-to-top:hover { transform: translateY(-2px); }

/* 侧边栏顶部工具栏 */
.sidebar-tools {
  display: flex;
  gap: 4px;
  padding: 0 0 12px;
}
.sidebar-tools button {
  flex: 1;
  padding: 6px 8px;
  border: 1px solid var(--border);
  border-radius: 6px;
  background: var(--tool-btn-bg);
  cursor: pointer;
  font-size: 12px;
  color: var(--tool-btn-text);
  transition: all 0.15s;
}
.sidebar-tools button:hover { background: var(--surface-hover); color: var(--text); }
.sidebar-tools button.active { background: var(--tool-btn-active-bg); color: var(--primary); border-color: var(--tool-btn-active-border); }

/* 排序按钮 */
.sort-btn {
  padding: 6px 14px;
  border: 1px solid var(--border);
  border-radius: 8px;
  background: var(--surface);
  cursor: pointer;
  font-size: 13px;
  color: var(--sort-btn-text);
  transition: all 0.15s;
}
.sort-btn:hover {
  background: var(--surface-hover);
  color: var(--text);
}

/* 搜索筛选器 */
#searchFilters {
  margin-bottom: 12px;
  display: none;
  gap: 8px;
  flex-wrap: wrap;
}
#searchFilters select {
  padding: 6px 10px;
  border: 1px solid var(--border);
  border-radius: 8px;
  font-size: 13px;
  background: var(--surface);
  color: var(--text);
  cursor: pointer;
}

/* 搜索历史下拉 */
.search-history {
  position: absolute;
  top: 100%;
  left: 0;
  right: 0;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 0 0 12px 12px;
  box-shadow: var(--shadow-md);
  z-index: 50;
  max-height: 240px;
  overflow-y: auto;
  margin-top: -4px;
  border-top: none;
}
.search-history-item {
  padding: 10px 16px;
  cursor: pointer;
  font-size: 14px;
  color: var(--text);
  transition: background 0.1s;
}
.search-history-item:hover { background: var(--surface-hover); }

/* 网格视图 */
.formula-grid.grid-view {
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
}
.formula-grid.grid-view .formula-card { padding: 16px; }
.formula-grid.grid-view .formula-detail { display: none; }

/* ===== 打印样式 ===== */
@media print {
  .sidebar, .search-wrap, .copy-btn, .favorite-btn, .toast, .theme-toggle,
  .sidebar-tools, .sort-btn, .back-to-top, #searchFilters, .mobile-sidebar-toggle,
  div[style*="position:fixed"][style*="top:0"] { display: none; }
  body { flex-direction: column; background: #fff; color: #000; }
  .main { max-width: 100%; padding: 0; }
  .formula-card {
    break-inside: avoid;
    box-shadow: none;
    border: 1px solid #ccc;
    page-break-inside: avoid;
  }
  .formula-card.expanded .formula-detail { max-height: none; }
  .formula-expand-hint { display: none; }
  .formula-latex { background: #fff; }
}
</style>
</head>
<body>

<main class="main">

      { name: '基本积分公式',

      { name: '第二类换元法（三角代换）',

      { name: '对称区间奇偶性',

      { name: '平面图形面积',

        detail: '直角坐标下关键步骤：①画图确定积分区域；②确定上下曲线（上减下）；③若两曲线有交点，以交点为界分段积分。极坐标用于心形线 r=a(1+cosθ)、双纽线 r²=a²cos2θ 等曲线围成的面积。最容易错：两条曲线围成的面积不是 ∫(f-g)² dx，而是 ∫[f(x)-g(x)] dx（一重积分，不是平方！）。' },

      { name: '平面曲线弧长',

        note: '直角坐标和参数方程两种形式，极坐标也有对应公式。',
        detail: '弧长微元 ds = √(dx²+dy²)，三种表示：①直角 y=f(x)：ds = √(1+y\'²) dx；②参数方程：ds = √(x\'²+y\'²) dt；③极坐标 r=r(θ)：ds = √(r²+r\'²) dθ。常见考题：求摆线、圆的周长、悬链线弧长。注意积分前先化简被积表达式——三角恒等式经常能把根号消掉。' },
      { name: '反常积分敛散性',
        latex: '\\begin{aligned} &\\text{无穷限：} \\int_a^{+\\infty} f(x)\\,dx = \\lim_{b \\to +\\infty} \\int_a^b f(x)\\,dx \\\\ &\\text{瑕积分（}a \\text{ 为瑕点）：} \\int_a^b f(x)\\,dx = \\lim_{\\varepsilon \\to 0^+} \\int_{a+\\varepsilon}^b f(x)\\,dx \\end{aligned}',
        note: '反常积分 = 定积分 + 取极限。核心：∫₁^∞ 1/x^p dx 收敛 ⇔ p>1；∫₀¹ 1/x^p dx 收敛 ⇔ p<1。',
        detail: '反常积分与常规定积分的核心区别：积分区间无穷或因被积函数无界。求法：①先求原函数 F(x)；②代入上下限并取极限；③极限存在则收敛，否则发散。p-积分的两个基准：∫₁^∞ 1/x^p dx 在 p>1 收敛、p≤1 发散；∫₀¹ 1/x^p dx 在 p<1 收敛、p≥1 发散。比较判别法：若 0≤f(x)≤g(x)，g 收敛 ⇒ f 收敛，f 发散 ⇒ g 发散。极限比较法：若 lim f/g = L (0<L<∞)，则 f 与 g 同敛散。重要：必须先判断收敛性才能计算值，发散的反常积分没有值！' },
      { name: '旋转曲面侧面积',

        note: '侧面积 = 2π × 半径 × 弧长微元 ds。与体积对比：体积用 f² dx，侧面积用 f ds。',
        detail: '侧面积公式推导：曲线绕轴旋转，曲线上每段弧长微元 ds 扫出一个"圆环带"，面积 = 2π×(旋转半径)×ds。绕 x 轴旋转半径 = f(x)；绕 y 轴旋转半径 = x。参数方程形式：S = 2π∫ y(t)·√(x\'²+y\'²) dt（绕 x 轴）。常与体积、弧长结合出题：已知曲线方程，求绕轴旋转所得旋转体的体积和侧面积。容易出错：体积公式是 π∫r² dx，侧面积公式是 2π∫r·ds——主项不同（r² vs r），微元不同（dx vs ds）！' },
      { name: '积分中值定理',
        latex: 'f \\in C[a,b] \\Rightarrow \\exists \\xi \\in [a,b],\\ \\int_a^b f(x)\\,dx = f(\\xi)(b-a)',
        note: '积分版的拉格朗日中值定理。f(ξ) 就是 f 在 [a,b] 上的积分平均值。证明题常用。',
        detail: '几何意义：曲线 f(x) 下方面积 = 以 f(ξ) 为高、(b-a) 为宽的矩形面积。其中 f(ξ) = (1/(b-a))∫_a^b f(x)dx 即 f 在 [a,b] 上的连续平均值。推广：若 f 连续、g 在 [a,b] 上不变号，则 ∃ξ∈[a,b] 使 ∫ fg dx = f(ξ)∫ g dx。证明思路：利用 f 在闭区间上的最大最小值 M,m，由 m ≤ f(x) ≤ M 得 m(b-a) ≤ ∫f ≤ M(b-a)，再用介值定理得结论。常考：证明含定积分的不等式或等式中存在性命题。' },
    ],

  'calc-ode': {
    title: '微分方程',
    formulas: [
      { name: '可分离变量方程',
        latex: '\\frac{dy}{dx} = f(x)g(y) \\Rightarrow \\int \\frac{dy}{g(y)} = \\int f(x)\\,dx',
        note: '把含 y 的放一边、含 x 的放一边，分别积分即得通解。',
        detail: '解法三步：①分离变量——把所有含 y 的移到 dy 侧、含 x 的移到 dx 侧；②两边同时积分（别忘了积分常数 C）；③化简得通解。陷阱：分离时 g(y)=0 对应的常数解 y≡y₀ 可能是奇解（不在通解中），需要单独验证是否丢失。考试中若题目给初始条件，最后代入定 C。' },
      { name: '一阶线性微分方程',
        latex: 'y\' + P(x)y = Q(x) \\Rightarrow y = e^{-\\int P dx}\\left[ \\int Q\\,e^{\\int P dx}\\,dx + C \\right]',
        note: '必背通解公式！e^{∫Pdx} 是积分因子，Q=0 时为齐次方程。',
        detail: '标准形式必须是 y\' + P(x)y = Q(x)（y\' 系数为 1，P(x) 是 y 的系数，Q(x) 在等式右边）。通解 = e^{-∫Pdx}[∫Q·e^{∫Pdx}dx + C]，其中 e^{∫Pdx} 称为积分因子。齐次情况（Q=0）：通解 y = Ce^{-∫Pdx}。常考方程如 y\'+y/x=sinx，注意 P(x)=1/x→∫Pdx=ln|x|→积分因子=x。' },
      { name: '二阶常系数齐次线性方程',
        latex: 'y\'\' + py\' + qy = 0 \\xrightarrow{\\lambda^2+p\\lambda+q=0} \\begin{cases} \\Delta>0: y=C_1 e^{\\lambda_1 x}+C_2 e^{\\lambda_2 x} \\\\ \\Delta=0: y=(C_1+C_2 x)e^{\\lambda x} \\\\ \\Delta<0: y=e^{\\alpha x}(C_1\\cos\\beta x+C_2\\sin\\beta x) \\end{cases}',
        note: '先写特征方程，根据判别式 Δ 分三种情况。λ = α ± iβ。',
        detail: '解法：将 y\'\'→λ²、y\'→λ、y→1 代入得特征方程 λ²+pλ+q=0。Δ>0 两不等实根→指数解；Δ=0 重根→乘 x 得第二个线性无关解；Δ<0 共轭复根 λ=α±iβ→e^{αx}(C₁cosβx+C₂sinβx)。注意：复根情况下 α 是实部（决定增减趋势），β 是虚部（决定振荡频率）。若题目给初始条件 y(0) 和 y\'(0)，代入通解求 C₁,C₂。' },
      { name: '二阶常系数非齐次特解形式',
        latex: '\\begin{aligned} &f(x) = P_m(x)e^{\\mu x}:\\ y^* = x^k Q_m(x)e^{\\mu x} \\\\ &f(x) = e^{\\alpha x}[P\\cos\\beta x + Q\\sin\\beta x]:\\ y^* = x^k e^{\\alpha x}[R\\cos\\beta x + S\\sin\\beta x] \\end{aligned}',
        note: 'k 由 μ(或 α±iβ) 是特征根的重数决定：不是根 k=0，单根 k=1，重根 k=2。',
        detail: '待定系数法求特解的完整流程：①写出对应齐次方程的特征根；②根据 f(x) 的形式确定特解类型；③判断 μ（或 α±iβ）是否是特征根，决定 x^k 的 k 值；④设特解（含待定系数），代入原方程比较系数求出各参数。通解 = 齐次通解 + 非齐次特解。叠加原理：若 f(x)=f₁(x)+f₂(x)，可分别求特解再加起来。' },
      { name: '伯努利方程',
        latex: 'y\' + P(x)y = Q(x)y^n \\ (n \\neq 0,1) \\xrightarrow{z = y^{1-n}} z\' + (1-n)P(x)z = (1-n)Q(x)',
        note: '非线性 → 线性：令 z=y^{1-n}，化为一阶线性方程用通解公式。注意 n=0 是线性、n=1 是可分离。',
        detail: '伯努利方程是少数可解析求解的非线性一阶方程。标准形式：y\' + P(x)y = Q(x)y^n。解法三步：①令 z = y^{1-n}，求导得 z\' = (1-n)y^{-n}·y\'；②原方程两边同乘 (1-n)y^{-n}，替换后得 z\' + (1-n)Pz = (1-n)Q（一阶线性！）；③用一阶线性通解公式求 z，最后代回 y = z^{1/(1-n)}。陷阱：n>0 时 y≡0 总是方程的解（可能是奇解，不一定包含在通解中），需单独验证。常考：判断方程类型并选择合适解法。' },
    ],
  },

  'calc-multi-diff': {
    title: '多元函数微分',
    formulas: [
      { name: '偏导数定义',
        latex: 'f_x(x_0,y_0) = \\lim_{\\Delta x \\to 0} \\frac{f(x_0+\\Delta x, y_0)-f(x_0,y_0)}{\\Delta x}',
        note: '对 x 求偏导时把 y 视为常数，对 y 求偏导时把 x 视为常数。',
        detail: '偏导是一元导数的自然推广：固定其他变量，只对一个变量求导。计算技巧与一元导数完全一样，只是其他变量当作常数。重要区别：一元函数可导⇒连续，但多元函数偏导存在不能推出连续！典型反例：f(x,y)=xy/(x²+y²) (补充 f(0,0)=0) 在 (0,0) 偏导存在但不连续。' },
      { name: '全微分',
        latex: 'dz = \\frac{\\partial z}{\\partial x}dx + \\frac{\\partial z}{\\partial y}dy',
        note: '偏导存在且偏导连续 ⇒ 全微分存在。可微 ⇒ 偏导存在、函数连续、方向导数存在。',
        detail: '全微分的几何意义：曲面在一点处的切平面方程。偏导连续 ⇒ 可微（充分非必要条件，偏导连续则可微，但可微不能推出偏导连续）。可微 ⇔ 全增量 Δz = f_x·Δx + f_y·Δy + o(ρ)，其中 ρ=√(Δx²+Δy²)。全微分用于近似计算：Δz ≈ dz = f_x·Δx + f_y·Δy。命题重点：可微、偏导存在、偏导连续、方向导数存在四者之间的关系。可微是最强的条件之一。' },
      { name: '多元复合函数链式法则',
        latex: 'z = f(u,v),\\ u=u(x,y),\\ v=v(x,y) \\Rightarrow \\frac{\\partial z}{\\partial x} = \\frac{\\partial z}{\\partial u}\\frac{\\partial u}{\\partial x} + \\frac{\\partial z}{\\partial v}\\frac{\\partial v}{\\partial x}',
        note: '画变量关系图！每条路径相乘、多条路径相加。',
        detail: '核心方法——画树形图：从 z 出发，到每个中间变量（u,v）画分支，再从每个中间变量到自变量（x,y）画分支。z→x 的每条完整路径对应一个偏导乘积项，所有路径求和。常见变体：①z=f(u,v) 且 u,v 只依赖于 t → dz/dt = ∂z/∂u·du/dt + ∂z/∂v·dv/dt（全导数）；②z=f(x,u(x,y)) → ∂z/∂x = ∂f/∂x + ∂f/∂u·∂u/∂x（注意区分 f 对第一个变量 x 的偏导和最终 ∂z/∂x）。' },
      { name: '隐函数求偏导',
        latex: 'F(x,y,z)=0 \\Rightarrow \\frac{\\partial z}{\\partial x} = -\\frac{F_x}{F_z},\\quad \\frac{\\partial z}{\\partial y} = -\\frac{F_y}{F_z}',
        note: '公式法最快。注意 F_z ≠ 0。',

      { name: '逆矩阵（2阶公式 + 伴随矩阵法）',
        latex: '\\begin{pmatrix} a & b \\\\ c & d \\end{pmatrix}^{-1} = \\frac{1}{ad-bc} \\begin{pmatrix} d & -b \\\\ -c & a \\end{pmatrix},\\quad A^{-1} = \\frac{A^*}{|A|}',

      { name: '矩阵方程求解',
        latex: '\\begin{aligned} AX = B &\\Rightarrow X = A^{-1}B \\\\ XA = B &\\Rightarrow X = BA^{-1} \\\\ AXB = C &\\Rightarrow X = A^{-1}CB^{-1} \\end{aligned}',

// ==================== 工具函数 ====================
let currentSection;
let isGridView = false;
let searchMode = false;      // 是否处于全局搜索模式
let searchSortBySection = true;

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(t._timeout);
  t._timeout = setTimeout(() => t.classList.remove('show'), 1800);
}

function getFavorites() {
  try { return JSON.parse(localStorage.getItem('math-favorites') || '[]'); }
  catch (e) { return []; }
}

function saveFavorites(list) {
  localStorage.setItem('math-favorites', JSON.stringify(list));
}

function isFavorited(sectionId, idx) {
  return getFavorites().some(f => f.s === sectionId && f.i === idx);
}

// ==================== 最近浏览 ====================
function getRecentFormulas() {
  try { return JSON.parse(localStorage.getItem('math-recent') || '[]'); }
  catch (e) { return []; }
}

function addRecentFormula(sectionId, idx) {
  let list = getRecentFormulas();
  list = list.filter(r => !(r.s === sectionId && r.i === idx));
  list.unshift({ s: sectionId, i: idx });
  if (list.length > 20) list.pop();
  localStorage.setItem('math-recent', JSON.stringify(list));
  const btn = document.getElementById('sub-recent');
  if (btn) btn.style.display = list.length > 0 ? '' : 'none';
}

function renderRecent() {
  const container = document.getElementById('formulaContainer');
  const recent = getRecentFormulas();
  searchMode = false;
  document.getElementById('btnSort').style.display = 'none';

  if (recent.length === 0) {
    container.innerHTML = '<div class="no-result" style="display:block;padding:64px 20px;">🕐 还没有浏览记录，点击卡片展开即可记录</div>';
    return;
  }

  let html = `<h2 class="section-title">🕐 最近浏览（${recent.length} 条）</h2><div class="formula-grid${isGridView ? ' grid-view' : ''}">`;
  recent.forEach(r => {
    const section = formulaData[r.s];
    if (!section) return;
    const f = section.formulas[r.i];
    if (!f) return;
    html += renderOneCard(f, r.s, r.i);
  });
  html += '</div>';
  container.innerHTML = html;
  recent.forEach(r => renderLaTeX(r.s, r.i));
}

// ==================== 搜索历史 ====================
function getSearchHistory() {
  try { return JSON.parse(localStorage.getItem('math-search-history') || '[]'); }
  catch (e) { return []; }
}

function addSearchHistory(query) {
  if (!query.trim()) return;
  let list = getSearchHistory().filter(h => h !== query);
  list.unshift(query);
  if (list.length > 10) list.pop();
  localStorage.setItem('math-search-history', JSON.stringify(list));
}

function toggleFavorite(sectionId, idx) {
  let list = getFavorites();
  const exist = list.findIndex(f => f.s === sectionId && f.i === idx);
  if (exist >= 0) {
    list.splice(exist, 1);
    showToast('已取消收藏');
  } else {
    list.push({ s: sectionId, i: idx });
    showToast('⭐ 已收藏');
  }
  saveFavorites(list);
  // 更新当前卡片上的按钮状态
  const card = document.querySelector(`.formula-card[data-section="${sectionId}"][data-index="${idx}"]`);
  if (card) {
    const btn = card.querySelector('.favorite-btn');
    if (btn) {
      btn.classList.toggle('favorited', isFavorited(sectionId, idx));
      btn.textContent = isFavorited(sectionId, idx) ? '★' : '☆';
    }
  }
  // 如果在收藏页面，重新渲染
  if (currentSection === '__favorites__') renderFavorites();
  // 更新侧边栏收藏按钮可见性
  const favSub = document.getElementById('sub-favorites');
  if (favSub) favSub.style.display = list.length > 0 ? '' : 'none';
}

async function copyLatex(sectionId, idx) {
  const section = formulaData[sectionId];
  if (!section) return;
  const f = section.formulas[idx];
  if (!f) return;
  try {
    await navigator.clipboard.writeText(f.latex);
    const btn = document.querySelector(`.formula-card[data-section="${sectionId}"][data-index="${idx}"] .copy-btn`);
    if (btn) { btn.classList.add('copied'); btn.textContent = '✓'; setTimeout(() => { btn.classList.remove('copied'); btn.textContent = '📋'; }, 1500); }
    showToast('LaTeX 已复制到剪贴板');
  } catch (e) {
    showToast('复制失败，请手动选择');
  }
}

// ==================== 章节复习进度 ====================
function getProgress() {
  try { return JSON.parse(localStorage.getItem('math-progress') || '{}'); }
  catch (e) { return {}; }
}

function markViewed(sectionId, idx) {
  const p = getProgress();
  if (!p[sectionId]) p[sectionId] = [];
  if (!p[sectionId].includes(idx)) {
    p[sectionId].push(idx);
    localStorage.setItem('math-progress', JSON.stringify(p));
    updateSidebarProgress();
  }
}

function resetProgress() {
  localStorage.removeItem('math-progress');
  updateSidebarProgress();
  showToast('进度已重置');
}

function updateSidebarProgress() {
  const p = getProgress();
  document.querySelectorAll('.sidebar .sub').forEach(b => {
    const sid = b.dataset.section;
    if (!sid || !formulaData[sid]) return;
    const total = formulaData[sid].formulas.length;
    const viewed = (p[sid] || []).length;
    const existing = b.querySelector('.progress-badge');
    if (existing) existing.remove();
    if (viewed > 0) {
      const badge = document.createElement('span');
      badge.className = 'progress-badge';
      badge.textContent = `${viewed}/${total}`;
      badge.style.cssText = 'font-size:10px;color:var(--text-secondary);margin-left:4px;';
      b.appendChild(badge);
    }
  });
}

// ==================== 渲染 ====================
function hl(text, query) {
  if (!query || !text) return text;
  const escaped = query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
  return text.replace(new RegExp(`(${escaped})`, 'gi'), '<mark>$1</mark>');
}

function renderOneCard(f, sectionId, i, highlightQuery) {
  const fav = isFavorited(sectionId, i);
  const level = f.level || ((f.note || '').includes('必考') ? 'important' : '');
  const levelLabel = { basic: '基础', important: '必考', advanced: '进阶' };
  const levelBadge = level ? `<span class="level-badge ${level}">${levelLabel[level] || level}</span>` : '';
  return `
    <div class="formula-card" tabindex="0" role="button" aria-expanded="false" data-section="${sectionId}" data-index="${i}">
      <button class="copy-btn" title="复制 LaTeX" aria-label="复制 LaTeX" data-action="copy">📋</button>
      <button class="favorite-btn${fav ? ' favorited' : ''}" title="收藏" aria-label="收藏" data-action="fav">${fav ? '★' : '☆'}</button>
      <div class="formula-name">${hl(f.name, highlightQuery)}${levelBadge}</div>
      <div class="formula-latex" id="latex-${sectionId}-${i}"></div>
      <div class="formula-note">${hl(f.note, highlightQuery)}</div>
      <div class="formula-detail">${hl(f.detail || '', highlightQuery)}</div>
      <div class="formula-expand-hint"><span aria-hidden="true">▶</span> 点击展开详解</div>
    </div>`;
}

function renderLaTeX(sectionId, i) {
  const section = formulaData[sectionId];
  if (!section) return;
  const f = section.formulas[i];
  if (!f) return;
  const el = document.getElementById(`latex-${sectionId}-${i}`);
  if (el) {
    try { katex.render(f.latex, el, { throwOnError: false, displayMode: true }); }
    catch (e) { el.textContent = f.latex; }
  }
}

function renderFormulas(sectionId) {
  const container = document.getElementById('formulaContainer');
  const section = formulaData[sectionId];
  if (!section) return;
  searchMode = false;
  document.getElementById('btnSort').style.display = 'none';

  let html = `<h2 class="section-title">${section.title}</h2><div class="formula-grid${isGridView ? ' grid-view' : ''}">`;
  section.formulas.forEach((f, i) => {
    html += renderOneCard(f, sectionId, i);
  });
  html += '</div>';
  container.innerHTML = html;
  section.formulas.forEach((_, i) => renderLaTeX(sectionId, i));
}

function renderFavorites() {
  const container = document.getElementById('formulaContainer');
  const favorites = getFavorites();
  searchMode = false;
  document.getElementById('btnSort').style.display = 'none';

  if (favorites.length === 0) {
    container.innerHTML = '<div class="no-result" style="display:block;padding:64px 20px;">⭐ 还没有收藏任何公式，点击卡片上的 ☆ 即可收藏</div>';
    return;
  }

  let html = `<h2 class="section-title">⭐ 我的收藏（${favorites.length} 条）</h2><div class="formula-grid${isGridView ? ' grid-view' : ''}">`;
  favorites.forEach(fav => {
    const section = formulaData[fav.s];
    if (!section) return;
    const f = section.formulas[fav.i];
    if (!f) return;
    html += renderOneCard(f, fav.s, fav.i);
  });
  html += '</div>';
  container.innerHTML = html;
  favorites.forEach(fav => renderLaTeX(fav.s, fav.i));
}

// 全局搜索：遍历所有章节
function renderSearchResults(query) {
  const container = document.getElementById('formulaContainer');
  searchMode = true;
  document.getElementById('btnSort').style.display = '';
  document.getElementById('searchFilters').style.display = 'flex';

  const q = query.trim().toLowerCase();
  if (!q) {
    searchMode = false;
    document.getElementById('btnSort').style.display = 'none';
    document.getElementById('searchFilters').style.display = 'none';
    navigateTo(currentSection || 'calc-limit');
    return;
  }

  const subjFilter = document.getElementById('filterSubject').value;
  const levelFilter = document.getElementById('filterLevel').value;

  // 收集所有匹配的公式
  let results = [];
  Object.keys(formulaData).forEach(sectionId => {
    if (subjFilter && !sectionId.startsWith(subjFilter)) return;
    const section = formulaData[sectionId];
    section.formulas.forEach((f, i) => {
      if (levelFilter) {
        const lv = f.level || ((f.note || '').includes('必考') ? 'important' : '');
        if (lv !== levelFilter) return;
      }
      const text = (f.name + ' ' + f.latex + ' ' + f.note + ' ' + (f.detail || '')).toLowerCase();
      if (text.includes(q)) {
        results.push({ sectionId, sectionTitle: section.title, formulaIndex: i, formula: f });
      }
    });
  });

  if (results.length === 0) {
    container.innerHTML = '';
    document.getElementById('noResult').style.display = 'block';
    return;
  }
  document.getElementById('noResult').style.display = 'none';

  // 排序
  if (searchSortBySection) {
    results.sort((a, b) => a.sectionId.localeCompare(b.sectionId) || a.formulaIndex - b.formulaIndex);
  }

  // 按章节分组渲染
  let html = '';
  let lastSection = '';
  results.forEach(r => {
    if (r.sectionTitle !== lastSection) {
      if (lastSection) html += '</div>';
      html += `<h2 class="section-title">${r.sectionTitle}</h2><div class="formula-grid${isGridView ? ' grid-view' : ''}">`;
      lastSection = r.sectionTitle;
    }
    html += renderOneCard(r.formula, r.sectionId, r.formulaIndex, query.trim());
  });
  html += '</div>';
  container.innerHTML = html;

  // 渲染 LaTeX
  results.forEach(r => renderLaTeX(r.sectionId, r.formulaIndex));
}

function navigateTo(sectionId) {
  // 隐藏筛选器（离开搜索模式）
  document.getElementById('searchFilters').style.display = 'none';
  if (sectionId === '__favorites__') {
    currentSection = '__favorites__';
    renderFavorites();
  } else if (sectionId === '__recent__') {
    currentSection = '__recent__';
    renderRecent();
  } else {
    if (!formulaData[sectionId]) return;
    currentSection = sectionId;
    renderFormulas(sectionId);
  }
  // 同步侧边栏 active 状态
  document.querySelectorAll('.sidebar .sub').forEach(b => {
    b.classList.remove('active');
    b.removeAttribute('aria-current');
    if (b.dataset.section === sectionId) {
      b.classList.add('active');
      b.setAttribute('aria-current', 'true');
    }
    if (b.id === 'sub-favorites') {
      b.style.display = getFavorites().length > 0 ? '' : 'none';
    }
    if (b.id === 'sub-recent') {
      b.style.display = getRecentFormulas().length > 0 ? '' : 'none';
    }
  });
  // 更新 URL hash
  const hashMap = { '__favorites__': 'favorites', '__recent__': 'recent' };
  const hash = hashMap[sectionId] || sectionId;
  if (location.hash.slice(1) !== hash) {
    history.replaceState(null, '', '#' + hash);
  }
  // 更新页面标题
  const titleMap = {
    '__favorites__': '我的收藏 - AI 数学公式速查表',
    '__recent__': '最近浏览 - AI 数学公式速查表'
  };
  if (titleMap[sectionId]) {
    document.title = titleMap[sectionId];
  } else if (formulaData[sectionId]) {
    document.title = formulaData[sectionId].title + ' - AI 数学公式速查表';
  }
}

// ==================== 卡片点击/键盘展开 ====================
function toggleCard(card) {
  const isExpanded = card.classList.contains('expanded');
  document.querySelectorAll('.formula-card.expanded').forEach(c => {
    c.classList.remove('expanded');
    c.setAttribute('aria-expanded', 'false');
    const hint = c.querySelector('.formula-expand-hint');
    if (hint) hint.innerHTML = '<span aria-hidden="true">▶</span> 点击展开详解';
  });
  if (!isExpanded) {
    card.classList.add('expanded');
    card.setAttribute('aria-expanded', 'true');
    const hint = card.querySelector('.formula-expand-hint');
    if (hint) hint.innerHTML = '<span aria-hidden="true">▼</span> 收起详解';
    card.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    addRecentFormula(card.dataset.section, parseInt(card.dataset.index));
    markViewed(card.dataset.section, parseInt(card.dataset.index));
  }
}

document.getElementById('formulaContainer').addEventListener('click', function(e) {
  // 复制按钮
  const copyBtn = e.target.closest('[data-action="copy"]');
  if (copyBtn) {
    e.stopPropagation();
    const card = copyBtn.closest('.formula-card');
    copyLatex(card.dataset.section, parseInt(card.dataset.index));
    return;
  }
  // 收藏按钮
  const favBtn = e.target.closest('[data-action="fav"]');
  if (favBtn) {
    e.stopPropagation();
    const card = favBtn.closest('.formula-card');
    toggleFavorite(card.dataset.section, parseInt(card.dataset.index));
    return;
  }
  // 展开卡片
  const card = e.target.closest('.formula-card');
  if (!card) return;
  if (e.target.closest('input')) return;
  toggleCard(card);
});

document.getElementById('formulaContainer').addEventListener('keydown', function(e) {
  if (e.key === 'Enter' || e.key === ' ') {
    if (e.target.closest('[data-action="copy"]') || e.target.closest('[data-action="fav"]')) return;
    const card = e.target.closest('.formula-card');
    if (!card) return;
    e.preventDefault();
    toggleCard(card);
  }
});

// ==================== 全局搜索（300ms 防抖） ====================
let searchTimer;
document.getElementById('searchInput').addEventListener('input', function() {
  clearTimeout(searchTimer);
  const input = this;
  searchTimer = setTimeout(() => {
    const query = input.value.trim().toLowerCase();
    document.getElementById('searchHistory').style.display = 'none';
    if (!query) {
      searchMode = false;
      document.getElementById('btnSort').style.display = 'none';
      document.getElementById('searchFilters').style.display = 'none';
      document.getElementById('noResult').style.display = 'none';
      navigateTo(currentSection || 'calc-limit');
    } else {
      addSearchHistory(input.value.trim());
      renderSearchResults(query);
    }
  }, 300);
});

document.getElementById('searchInput').addEventListener('focus', function() {
  if (!this.value.trim()) renderSearchHistory();
});

document.getElementById('searchInput').addEventListener('blur', function() {
  setTimeout(() => { document.getElementById('searchHistory').style.display = 'none'; }, 200);
});

// 搜索框 Esc 清空
document.getElementById('searchInput').addEventListener('keydown', function(e) {
  if (e.key === 'Escape') {
    this.value = '';
    this.dispatchEvent(new Event('input'));
  }
});

function renderSearchHistory() {
  const list = getSearchHistory();
  const el = document.getElementById('searchHistory');
  if (list.length === 0) { el.style.display = 'none'; return; }
  el.innerHTML = list.map(q => `<div class="search-history-item">${q}</div>`).join('');
  el.style.display = '';
}

document.getElementById('searchHistory').addEventListener('click', function(e) {
  const item = e.target.closest('.search-history-item');
  if (!item) return;
  const input = document.getElementById('searchInput');
  input.value = item.textContent;
  input.dispatchEvent(new Event('input'));
  document.getElementById('searchHistory').style.display = 'none';
});

// 搜索筛选器
document.getElementById('filterSubject').addEventListener('change', function() {
  const q = document.getElementById('searchInput').value.trim();
  if (q) renderSearchResults(q);
});
document.getElementById('filterLevel').addEventListener('change', function() {
  const q = document.getElementById('searchInput').value.trim();
  if (q) renderSearchResults(q);
});

// ==================== 排序按钮 ====================
document.getElementById('btnSort').addEventListener('click', function() {
  searchSortBySection = !searchSortBySection;
  this.textContent = searchSortBySection ? '🔤 按章节排序' : '🔢 按匹配排序';
  if (searchMode) {
    renderSearchResults(document.getElementById('searchInput').value);
  }
});

// ==================== 侧边栏切换（事件委托） ====================
document.querySelector('.sidebar').addEventListener('click', function(e) {
  const btn = e.target.closest('.sub');
  if (!btn) return;
  const sectionId = btn.dataset.section;
  document.querySelectorAll('.sidebar .sub').forEach(b => {
    b.classList.remove('active');
    b.removeAttribute('aria-current');
  });
  navigateTo(sectionId);
  document.getElementById('searchInput').value = '';
  document.getElementById('noResult').style.display = 'none';
  document.getElementById('formulaContainer').scrollIntoView({ behavior: 'smooth', block: 'start' });
});

// ==================== 收藏按钮（侧边栏顶部） ====================
document.getElementById('btnFavorites').addEventListener('click', function() {
  document.getElementById('searchInput').value = '';
  document.getElementById('noResult').style.display = 'none';
  navigateTo('__favorites__');
});

// ==================== 网格视图切换 ====================
document.getElementById('btnGridView').addEventListener('click', function() {
  isGridView = !isGridView;
  this.classList.toggle('active', isGridView);
  this.textContent = isGridView ? '📋 列表' : '📋 网格';
  // 重新渲染当前视图
  if (currentSection === '__favorites__') {
    renderFavorites();
  } else if (currentSection === '__recent__') {
    renderRecent();
  } else if (searchMode) {
    renderSearchResults(document.getElementById('searchInput').value);
  } else if (currentSection) {
    renderFormulas(currentSection);
  }
});

// ==================== 随机公式 ====================
document.getElementById('btnRandom').addEventListener('click', function() {
  const sections = Object.keys(formulaData);
  const sid = sections[Math.floor(Math.random() * sections.length)];
  const formulas = formulaData[sid].formulas;
  const idx = Math.floor(Math.random() * formulas.length);
  navigateTo(sid);
  setTimeout(function() {
    const card = document.querySelector(`.formula-card[data-section="${sid}"][data-index="${idx}"]`);
    if (card) { toggleCard(card); card.scrollIntoView({ behavior: 'smooth', block: 'center' }); }
  }, 150);
});

document.getElementById('btnResetProgress').addEventListener('click', function() {
  if (confirm('确定要重置所有章节的复习进度吗？')) resetProgress();
});

document.getElementById('btnPrint').addEventListener('click', function() {
  document.querySelectorAll('.formula-card').forEach(c => {
    if (!c.classList.contains('expanded')) {
      c.classList.add('expanded');
      c.setAttribute('aria-expanded', 'true');
      const hint = c.querySelector('.formula-expand-hint');
      if (hint) hint.innerHTML = '<span aria-hidden="true">▼</span> 收起详解';
    }
  });
  setTimeout(() => window.print(), 200);
});

// ==================== 主题切换 ====================
(function() {
  const btn = document.getElementById('btnTheme');
  const html = document.documentElement;

  function getTheme() { return localStorage.getItem('math-theme') || 'auto'; }

  function applyTheme(theme) {
    html.classList.remove('dark', 'light');
    if (theme === 'dark') { html.classList.add('dark'); btn.innerHTML = '☀️'; }
    else if (theme === 'light') { html.classList.add('light'); btn.innerHTML = '🌙'; }
    else { btn.innerHTML = '🌙'; }
  }

  function toggleTheme() {
    const themes = ['auto', 'dark', 'light'];
    const current = getTheme();
    const next = themes[(themes.indexOf(current) + 1) % themes.length];
    localStorage.setItem('math-theme', next);
    applyTheme(next);
    showToast({ auto: '切换为自动模式', dark: '已切换暗色模式', light: '已切换亮色模式' }[next]);
  }

  applyTheme(getTheme());
  btn.addEventListener('click', toggleTheme);
})();

// ==================== 键盘快捷键 ====================
document.addEventListener('keydown', function(e) {
  const mod = e.ctrlKey || e.metaKey;

  // Ctrl+K / Cmd+K → 聚焦搜索
  if (mod && e.key === 'k') {
    e.preventDefault();
    document.getElementById('searchInput').focus();
    return;
  }

  // Alt 组合键
  if (e.altKey) {
    if (e.key === 'f' || e.key === 'F') {
      e.preventDefault();
      document.getElementById('searchInput').value = '';
      document.getElementById('noResult').style.display = 'none';
      navigateTo('__favorites__');
    } else if (e.key === 'g' || e.key === 'G') {
      e.preventDefault();
      document.getElementById('btnGridView').click();
    } else if (e.key === 't' || e.key === 'T') {
      e.preventDefault();
      document.getElementById('btnTheme').click();
    } else if (e.key === 'r' || e.key === 'R') {
      e.preventDefault();
      document.getElementById('btnRandom').click();
    }
  }
});

// ==================== 回到顶部 ====================
(function() {
  const btn = document.getElementById('btnBackToTop');
  window.addEventListener('scroll', function() {
    btn.classList.toggle('visible', window.scrollY > 400);
  }, { passive: true });
  btn.addEventListener('click', function() {
    window.scrollTo({ top: 0, behavior: 'smooth' });
  });
})();

// ==================== 移动端侧边栏 ====================
(function() {
  const sidebar = document.querySelector('.sidebar');
  const toggle = document.createElement('button');
  toggle.className = 'mobile-sidebar-toggle';
  toggle.innerHTML = '☰';
  toggle.title = '展开/收起目录';
  toggle.setAttribute('aria-label', '展开/收起目录');
  toggle.style.cssText = 'display:none;width:100%;padding:8px;margin-bottom:4px;border:1px solid var(--border);border-radius:8px;background:var(--surface);color:var(--text);cursor:pointer;font-size:16px;';

  function updateToggle() {
    toggle.style.display = window.innerWidth <= 768 ? '' : 'none';
  }
  updateToggle();
  window.addEventListener('resize', updateToggle);

  sidebar.parentNode.insertBefore(toggle, sidebar);

  toggle.addEventListener('click', function() {
    sidebar.classList.toggle('mobile-collapsed');
    toggle.innerHTML = sidebar.classList.contains('mobile-collapsed') ? '☰ 展开目录' : '✕ 收起目录';
  });
})();

// ==================== 初始化 ====================
(function init() {
  let sectionId;
  if (location.hash) {
    const hash = location.hash.slice(1);
    if (hash === 'favorites') sectionId = '__favorites__';
    else if (hash === 'recent') sectionId = '__recent__';
    else sectionId = hash;
  }
  if (!sectionId || (!formulaData[sectionId] && sectionId !== '__favorites__' && sectionId !== '__recent__')) {
    sectionId = 'calc-limit';
  }
  navigateTo(sectionId);
  updateSidebarProgress();
})();

window.addEventListener('hashchange', function() {
  const hash = location.hash.slice(1);
  let sectionId;
  if (hash === 'favorites') sectionId = '__favorites__';
  else if (hash === 'recent') sectionId = '__recent__';
  else sectionId = hash;
  if (sectionId && (formulaData[sectionId] || sectionId === '__favorites__' || sectionId === '__recent__') && sectionId !== currentSection) {
    navigateTo(sectionId);
    document.getElementById('searchInput').value = '';
    document.getElementById('noResult').style.display = 'none';
  }
});

// ==================== 离线支持 ====================
(function() {
  // 离线状态提示条
  const banner = document.createElement('div');
  banner.style.cssText = 'display:none;position:fixed;top:0;left:0;right:0;padding:8px;text-align:center;font-size:13px;z-index:9999;background:#f59e0b;color:#fff;';
  banner.textContent = '当前处于离线状态，部分功能可能受限';
  document.body.appendChild(banner);

  function updateOnlineStatus() {
    banner.style.display = navigator.onLine ? 'none' : '';
  }
  window.addEventListener('online', updateOnlineStatus);
  window.addEventListener('offline', updateOnlineStatus);
  updateOnlineStatus();

  // 预缓存 KaTeX 资源（主线程 Cache API）
  if ('caches' in window) {
    caches.open('math-katex-v1').then(function(cache) {
      cache.addAll([
        'https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css',
        'https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js'
      ]).catch(function() { /* 静默失败，HTTP 缓存兜底 */ });
    });
  }

  // 注册 Service Worker（仅 https 或 localhost 环境有效）
  if ('serviceWorker' in navigator && !location.protocol.startsWith('file')) {
    navigator.serviceWorker.register(
      new URL('sw.js', location.href).href,
      { scope: './' }
    ).catch(function() { /* 静默失败 */ });
  }
})();
</script>
